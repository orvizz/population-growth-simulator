sonar.projectKey=YOUR_GITHUB_USERNAME_population-growth-simulator
sonar.organization=YOUR_SONARCLOUD_ORGANIZATION

sonar.projectName=Population Growth Simulator
sonar.projectVersion=0.2.0

# Source directories to analyse
sonar.sources=api,db,frontend
sonar.tests=tests

sonar.python.version=3.13

# Coverage report generated by CI
sonar.python.coverage.reportPaths=coverage.xml

# Exclude generated/vendor files
sonar.exclusions=**/__pycache__/**,**/.venv/**,**/alembic/versions/**,growt-simulator-app/**
sonar.test.exclusions=tests/**
