services:
  db:
    image: postgres:16-alpine
    container_name: tfg_postgres
    env_file: .env
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: tfg_api
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    # entrypoint.sh runs migrations + seed automatically before starting the API

  frontend:
    build: .
    container_name: tfg_frontend
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      API_BASE_URL: http://api:8000
    ports:
      - "8888:8888"
    volumes:
      - .:/app
    depends_on:
      - api
    command: ["python", "-m", "shiny", "run", "frontend/app.py", "--host", "0.0.0.0", "--port", "8888"]

volumes:
  postgres_data:
