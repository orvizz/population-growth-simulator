version: 2

updates:
  # Python dependencies (requirements.txt)
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      # Group minor/patch updates into a single PR to reduce noise
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions (keep action versions up to date)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

  # Docker base image (Dockerfile)
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
