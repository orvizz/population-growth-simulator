name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.13"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: matrix_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: matrix_db
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      JWT_SECRET_KEY: ci-test-secret-key-not-used-in-production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run database migrations
        run: python -m alembic upgrade head

      - name: Run unit tests (no DB required)
        run: python -m pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        run: python -m pytest tests/ --ignore=tests/unit/ --ignore=tests/e2e/ -v --tb=short

      - name: Generate coverage report
        run: |
          python -m pytest tests/ \
            --ignore=tests/e2e/ \
            --cov=api --cov=db \
            --cov-report=term-missing \
            --cov-report=xml \
            -q

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  e2e:
    name: E2E tests (Firefox)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Install Playwright + Firefox
        run: python -m playwright install firefox --with-deps

      - name: Run E2E tests
        run: python -m pytest tests/e2e/ -v --tb=short --browser firefox
