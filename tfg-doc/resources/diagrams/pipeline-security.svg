<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="865px" preserveAspectRatio="none" style="width:1219px;height:865px;background:#FFFFFF;" version="1.1" viewBox="0 0 1219 865" width="1219px" zoomAndPan="magnify"><defs/><g><rect fill="none" height="12.5781" style="stroke:none;stroke-width:1.0;" width="1186" x="15" y="11"/><ellipse cx="152.5" cy="53.5781" fill="#003087" rx="10" ry="10" style="stroke:#222222;stroke-width:1.0;"/><rect fill="#EEF3FA" height="32.5781" rx="12.5" ry="12.5" style="stroke:#003087;stroke-width:0.5;" width="64" x="120.5" y="83.5781"/><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="44" x="130.5" y="103.959">Checkout</text><rect fill="#EEF3FA" height="45.1563" rx="12.5" ry="12.5" style="stroke:#003087;stroke-width:0.5;" width="132" x="86.5" y="136.1563"/><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="62" x="96.5" y="156.5371">Install Bandit</text><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="112" x="96.5" y="169.1152">(pip install bandit[toml])</text><path d="M270,200.0234 L270,219.8906 L250,223.8906 L270,227.8906 L270,247.7578 A0,0 0 0 0 270,247.7578 L460,247.7578 A0,0 0 0 0 460,247.7578 L460,210.0234 L450,200.0234 L270,200.0234 A0,0 0 0 0 270,200.0234 " fill="#FFF9E6" style="stroke:#C8A400;stroke-width:0.5;"/><path d="M450,200.0234 L450,210.0234 L460,210.0234 L450,200.0234 " fill="#FFF9E6" style="stroke:#C8A400;stroke-width:0.5;"/><text fill="#555555" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="94" x="276" y="215.4043">Two-pass approach:</text><text fill="#555555" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="125" x="276" y="227.9824">first pass writes the artifact,</text><text fill="#555555" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="169" x="276" y="240.5605">second pass gates on HIGH severity.</text><rect fill="#EEF3FA" height="45.1563" rx="12.5" ry="12.5" style="stroke:#003087;stroke-width:0.5;" width="195" x="55" y="201.3125"/><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="146" x="65" y="221.6934">Run Bandit &#8212; medium severity</text><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="175" x="65" y="234.2715">(api/ db/ &#8594; bandit-report.json artifact)</text><rect fill="#EEF3FA" height="45.1563" rx="12.5" ry="12.5" style="stroke:#003087;stroke-width:0.5;" width="263" x="21" y="267.7578"/><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="139" x="31" y="288.1387">Fail on HIGH-severity findings</text><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="243" x="31" y="300.7168">(bandit --severity-level high --confidence-level high)</text><ellipse cx="152.5" cy="343.9141" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1.0;"/><ellipse cx="152.5" cy="343.9141" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.5;" x1="15" x2="15" y1="11" y2="853.4063"/><ellipse cx="621" cy="374.9141" fill="#003087" rx="10" ry="10" style="stroke:#222222;stroke-width:1.0;"/><rect fill="#EEF3FA" height="32.5781" rx="12.5" ry="12.5" style="stroke:#003087;stroke-width:0.5;" width="64" x="589" y="404.9141"/><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="44" x="599" y="425.2949">Checkout</text><rect fill="#EEF3FA" height="32.5781" rx="12.5" ry="12.5" style="stroke:#003087;stroke-width:0.5;" width="93" x="574.5" y="457.4922"/><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="73" x="584.5" y="477.873">Install pip-audit</text><rect fill="#EEF3FA" height="45.1563" rx="12.5" ry="12.5" style="stroke:#003087;stroke-width:0.5;" width="300" x="471" y="510.0703"/><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="103" x="481" y="530.4512">Audit requirements.txt</text><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="280" x="481" y="543.0293">(pip-audit -r requirements.txt &#8594; pip-audit-report.json artifact)</text><ellipse cx="621" cy="586.2266" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1.0;"/><ellipse cx="621" cy="586.2266" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.5;" x1="465" x2="465" y1="11" y2="853.4063"/><ellipse cx="912.5" cy="617.2266" fill="#003087" rx="10" ry="10" style="stroke:#222222;stroke-width:1.0;"/><rect fill="#EEF3FA" height="32.5781" rx="12.5" ry="12.5" style="stroke:#003087;stroke-width:0.5;" width="64" x="880.5" y="647.2266"/><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="44" x="890.5" y="667.6074">Checkout</text><rect fill="#EEF3FA" height="45.1563" rx="12.5" ry="12.5" style="stroke:#003087;stroke-width:0.5;" width="263" x="781" y="699.8047"/><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="113" x="791" y="720.1855">Build API Docker image</text><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="243" x="791" y="732.7637">(docker build -t population-growth-simulator-api:ci .)</text><path d="M1056.5,763.6719 L1056.5,783.5391 L1036.5,787.5391 L1056.5,791.5391 L1056.5,811.4063 A0,0 0 0 0 1056.5,811.4063 L1195.5,811.4063 A0,0 0 0 0 1195.5,811.4063 L1195.5,773.6719 L1185.5,763.6719 L1056.5,763.6719 A0,0 0 0 0 1056.5,763.6719 " fill="#FFF9E6" style="stroke:#C8A400;stroke-width:0.5;"/><path d="M1185.5,763.6719 L1185.5,773.6719 L1195.5,773.6719 L1185.5,763.6719 " fill="#FFF9E6" style="stroke:#C8A400;stroke-width:0.5;"/><text fill="#555555" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="116" x="1062.5" y="779.0527">exit-code: 0 means Trivy</text><text fill="#555555" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="118" x="1062.5" y="791.6309">reports vulnerabilities but</text><text fill="#555555" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="111" x="1062.5" y="804.209">never fails the workflow.</text><rect fill="#EEF3FA" height="45.1563" rx="12.5" ry="12.5" style="stroke:#003087;stroke-width:0.5;" width="248" x="788.5" y="764.9609"/><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="142" x="798.5" y="785.3418">Run Trivy &#8212; CRITICAL / HIGH</text><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="228" x="798.5" y="797.9199">(exit-code: 0 &#8212; reports findings but never blocks)</text><ellipse cx="912.5" cy="842.4063" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1.0;"/><ellipse cx="912.5" cy="842.4063" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.5;" x1="775" x2="775" y1="11" y2="853.4063"/><line style="stroke:#000000;stroke-width:1.5;" x1="1200.5" x2="1200.5" y1="11" y2="853.4063"/><line style="stroke:#333333;stroke-width:1.0;" x1="152.5" x2="152.5" y1="28.5781" y2="43.5781"/><polygon fill="#333333" points="148.5,33.5781,152.5,43.5781,156.5,33.5781,152.5,37.5781" style="stroke:#333333;stroke-width:1.0;"/><line style="stroke:#333333;stroke-width:1.0;" x1="152.5" x2="152.5" y1="63.5781" y2="83.5781"/><polygon fill="#333333" points="148.5,73.5781,152.5,83.5781,156.5,73.5781,152.5,77.5781" style="stroke:#333333;stroke-width:1.0;"/><line style="stroke:#33