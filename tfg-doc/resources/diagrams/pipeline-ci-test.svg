<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="659px" preserveAspectRatio="none" style="width:379px;height:659px;background:#FFFFFF;" version="1.1" viewBox="0 0 379 659" width="379px" zoomAndPan="magnify"><defs/><g><path d="M10,10 L10,45.1563 L367,45.1563 L367,20 L357,10 L10,10 " fill="#FFF9E6" style="stroke:#C8A400;stroke-width:0.5;"/><path d="M357,10 L357,20 L367,20 L357,10 " fill="#FFF9E6" style="stroke:#C8A400;stroke-width:0.5;"/><text fill="#555555" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="226" x="16" y="25.3809">ci.yml &#183; Triggers: push / PR &#8594; main, dev, master</text><text fill="#555555" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="336" x="16" y="37.959">Postgres 16 service container is health-checked before any step begins.</text><ellipse cx="188.5" cy="75.1563" fill="#003087" rx="10" ry="10" style="stroke:#222222;stroke-width:1.0;"/><rect fill="#EEF3FA" height="45.1563" rx="12.5" ry="12.5" style="stroke:#003087;stroke-width:0.5;" width="127" x="125" y="105.1563"/><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="44" x="135" y="125.5371">Checkout</text><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="107" x="135" y="138.1152">(actions/checkout@v4)</text><rect fill="#EEF3FA" height="45.1563" rx="12.5" ry="12.5" style="stroke:#003087;stroke-width:0.5;" width="198" x="89.5" y="170.3125"/><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="88" x="99.5" y="190.6934">Setup Python 3.13</text><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="178" x="99.5" y="203.2715">(actions/setup-python@v5, pip cache)</text><rect fill="#EEF3FA" height="45.1563" rx="12.5" ry="12.5" style="stroke:#003087;stroke-width:0.5;" width="239" x="69" y="235.4688"/><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="98" x="79" y="255.8496">Install dependencies</text><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="219" x="79" y="268.4277">(pip install -r requirements.txt pytest pytest-cov)</text><rect fill="#EEF3FA" height="45.1563" rx="12.5" ry="12.5" style="stroke:#003087;stroke-width:0.5;" width="134" x="121.5" y="300.625"/><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="96" x="131.5" y="321.0059">Apply DB migrations</text><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="114" x="131.5" y="333.584">(alembic upgrade head)</text><rect fill="#EEF3FA" height="45.1563" rx="12.5" ry="12.5" style="stroke:#003087;stroke-width:0.5;" width="111" x="133" y="365.7813"/><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="42" x="143" y="386.1621">Unit tests</text><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="91" x="143" y="398.7402">(pytest tests/unit/ -v)</text><rect fill="#EEF3FA" height="45.1563" rx="12.5" ry="12.5" style="stroke:#003087;stroke-width:0.5;" width="257" x="60" y="430.9375"/><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="74" x="70" y="451.3184">Integration tests</text><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="237" x="70" y="463.8965">(pytest tests/ --ignore=tests/unit/ --ignore=tests/e2e/)</text><rect fill="#EEF3FA" height="45.1563" rx="12.5" ry="12.5" style="stroke:#003087;stroke-width:0.5;" width="347" x="15" y="496.0938"/><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="121" x="25" y="516.4746">Generate coverage report</text><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="327" x="25" y="529.0527">(--cov=api --cov=db --cov=frontend.components.utils --cov-report=xml)</text><rect fill="#EEF3FA" height="45.1563" rx="12.5" ry="12.5" style="stroke:#003087;stroke-width:0.5;" width="158" x="109.5" y="561.25"/><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="138" x="119.5" y="581.6309">Upload coverage to Codecov</text><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="103" x="119.5" y="594.209">(fail_ci_if_error: false)</text><ellipse cx="188.5" cy="637.4063" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1.0;"/><ellipse cx="188.5" cy="637.4063" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1.0;"/><line style="stroke:#333333;stroke-width:1.0;" x1="188.5" x2="188.5" y1="45.1563" y2="65.1563"/><polygon fill="#333333" points="184.5,55.1563,188.5,65.1563,192.5,55.1563,188.5,59.1563" style="stroke:#333333;stroke-width:1.0;"/><line style="stroke:#333333;stroke-width:1.0;" x1="188.5" x2="188.5" y1="85.1563" y2="105.1563"/><polygon fill="#333333" points="184.5,95.1563,188.5,105.1563,192.5,95.1563,188.5,99.1563" style="stroke:#333333;stroke-width:1.0;"/><line style="stroke:#333333;stroke-width:1.0;" x1="188.5" x2="188.5" y1="150.3125" y2="170.3125"/><polygon fill="#333333" points="184.5,160.3125,188.5,170.3125,192.5,160.3125,188.5,164.3125" style="stroke:#333333;stroke-width:1.0;"/><line style="stroke:#333333;stroke-width:1.0;" x1="188.5" x2="188.5" y1="215.4688" y2="235.4688"/><polygon fill="#333333" points="184.5,225.4688,188.5,235.4688,192.5,225.4688,188.5,229.4688" style="stroke:#333333;stroke-width:1.0;"/><line style="stroke:#333333;stroke-width:1.0;" x1="188.5" x2="188.5" y1="280.625" y2="300.625"/><polygon fill="#333333" points="184.5,290.625,188.5,300.625,1