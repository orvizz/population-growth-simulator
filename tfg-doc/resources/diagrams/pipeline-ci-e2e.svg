<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="463px" preserveAspectRatio="none" style="width:349px;height:463px;background:#FFFFFF;" version="1.1" viewBox="0 0 349 463" width="349px" zoomAndPan="magnify"><defs/><g><path d="M10,10 L10,45.1563 L337,45.1563 L337,20 L327,10 L10,10 " fill="#FFF9E6" style="stroke:#C8A400;stroke-width:0.5;"/><path d="M327,10 L327,20 L337,20 L327,10 " fill="#FFF9E6" style="stroke:#C8A400;stroke-width:0.5;"/><text fill="#555555" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="226" x="16" y="25.3809">ci.yml &#183; Triggers: push / PR &#8594; main, dev, master</text><text fill="#555555" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="306" x="16" y="37.959">Runs independently of the test job; no database service required.</text><ellipse cx="173.5" cy="75.1563" fill="#003087" rx="10" ry="10" style="stroke:#222222;stroke-width:1.0;"/><rect fill="#EEF3FA" height="45.1563" rx="12.5" ry="12.5" style="stroke:#003087;stroke-width:0.5;" width="127" x="110" y="105.1563"/><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="44" x="120" y="125.5371">Checkout</text><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="107" x="120" y="138.1152">(actions/checkout@v4)</text><rect fill="#EEF3FA" height="45.1563" rx="12.5" ry="12.5" style="stroke:#003087;stroke-width:0.5;" width="198" x="74.5" y="170.3125"/><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="88" x="84.5" y="190.6934">Setup Python 3.13</text><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="178" x="84.5" y="203.2715">(actions/setup-python@v5, pip cache)</text><rect fill="#EEF3FA" height="45.1563" rx="12.5" ry="12.5" style="stroke:#003087;stroke-width:0.5;" width="179" x="84" y="235.4688"/><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="134" x="94" y="255.8496">Install Python dependencies</text><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="159" x="94" y="268.4277">(pip install -r requirements-dev.txt)</text><rect fill="#EEF3FA" height="45.1563" rx="12.5" ry="12.5" style="stroke:#003087;stroke-width:0.5;" width="190" x="78.5" y="300.625"/><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="124" x="88.5" y="321.0059">Install Playwright + Firefox</text><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="170" x="88.5" y="333.584">(playwright install firefox --with-deps)</text><rect fill="#EEF3FA" height="45.1563" rx="12.5" ry="12.5" style="stroke:#003087;stroke-width:0.5;" width="187" x="80" y="365.7813"/><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="65" x="90" y="386.1621">Run E2E tests</text><text fill="#003087" font-family="Liberation Sans" font-size="10" lengthAdjust="spacing" textLength="167" x="90" y="398.7402">(pytest tests/e2e/ -v --browser firefox)</text><ellipse cx="173.5" cy="441.9375" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1.0;"/><ellipse cx="173.5" cy="441.9375" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1.0;"/><line style="stroke:#333333;stroke-width:1.0;" x1="173.5" x2="173.5" y1="45.1563" y2="65.1563"/><polygon fill="#333333" points="169.5,55.1563,173.5,65.1563,177.5,55.1563,173.5,59.1563" style="stroke:#333333;stroke-width:1.0;"/><line style="stroke:#333333;stroke-width:1.0;" x1="173.5" x2="173.5" y1="85.1563" y2="105.1563"/><polygon fill="#333333" points="169.5,95.1563,173.5,105.1563,177.5,95.1563,173.5,99.1563" style="stroke:#333333;stroke-width:1.0;"/><line st